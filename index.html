<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lauren & Viraj's World</title>
<link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.95/Build/Cesium/Widgets/widgets.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Caveat:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --card-bg:#fff;--accent:#d4764e;--accent2:#c2536a;--accent3:#4a90b8;
  --text:#2a2a35;--text-dim:#8a8694;
}
html,body{height:100%;overflow:hidden;font-family:'DM Sans',sans-serif;color:var(--text)}
#cesiumContainer{width:100%;height:100%;position:fixed;inset:0}

/* Hide ALL Cesium UI chrome */
.cesium-viewer-toolbar,
.cesium-viewer-animationContainer,
.cesium-viewer-timelineContainer,
.cesium-viewer-fullscreenContainer,
.cesium-viewer-vrContainer,
.cesium-viewer-bottom,
.cesium-viewer-selectionIndicatorContainer,
.cesium-viewer-infoBoxContainer,
.cesium-credit-lightbox-overlay,
.cesium-credit-expand-link,
.cesium-geocoder-searchButton,
.cesium-baseLayerPicker-dropDown,
.cesium-viewer .cesium-widget-credits{display:none!important;visibility:hidden!important}
.cesium-widget-credits{opacity:0!important;height:0!important;pointer-events:none!important}
.cesium-viewer-bottom{display:none!important}

/* Header */
.site-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:18px 28px;display:flex;justify-content:space-between;align-items:center;
  pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,0.25),transparent);
}
.site-header>*{pointer-events:auto}
.logo{
  font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;
  color:#fff;text-shadow:0 2px 16px rgba(0,0,0,0.4);
}
.logo .amp{font-family:'Caveat',cursive;font-size:1.5rem;color:var(--accent);margin:0 2px}

.bottom-bar{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:22px;align-items:center;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);
  padding:9px 22px;border-radius:100px;
  border:1px solid rgba(0,0,0,0.06);
  font-size:0.76rem;color:var(--text-dim);
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}
.bottom-bar strong{color:var(--text);margin-right:3px}

/* Context menu */
.ctx-menu{
  position:fixed;z-index:500;
  background:#fff;border:1px solid rgba(0,0,0,0.08);
  border-radius:14px;padding:6px;min-width:220px;
  box-shadow:0 12px 48px rgba(0,0,0,0.15);
  display:none;animation:menuIn .15s ease;
}
@keyframes menuIn{from{opacity:0;transform:scale(.95)translateY(4px)}to{opacity:1;transform:scale(1)translateY(0)}}
.ctx-menu.show{display:block}
.ctx-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  font-size:.88rem;cursor:pointer;transition:background .15s;
}
.ctx-item:hover{background:rgba(0,0,0,.04)}
.ctx-item .icon{font-size:1.15rem;width:26px;text-align:center}
.ctx-sep{height:1px;background:rgba(0,0,0,.06);margin:4px 10px}
.ctx-coords{padding:6px 14px 4px;font-size:.68rem;color:var(--text-dim);letter-spacing:.04em}

/* Overlay + detail card */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.3);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.overlay.active{opacity:1;pointer-events:auto}

.detail-card{
  position:fixed;right:-540px;top:0;bottom:0;
  width:500px;max-width:92vw;z-index:210;
  background:#fff;border-left:1px solid rgba(0,0,0,.06);
  overflow-y:auto;transition:right .45s cubic-bezier(.16,1,.3,1);
  box-shadow:-12px 0 40px rgba(0,0,0,.08);
}
.detail-card.active{right:0}

.card-hero-emoji{
  width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:4rem;
}
.card-gallery{display:grid;gap:3px}
.card-gallery.c1{grid-template-columns:1fr}
.card-gallery.c2{grid-template-columns:1fr 1fr}
.card-gallery.c3{grid-template-columns:1fr 1fr 1fr}
.card-gallery img{width:100%;height:220px;object-fit:cover;cursor:pointer;transition:filter .2s}
.card-gallery.c2 img{height:200px}
.card-gallery.c3 img{height:160px}
.card-gallery img:hover{filter:brightness(1.08)}

.card-body{padding:28px 30px 36px}
.card-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--accent);margin-bottom:10px;
  padding:3px 10px;border-radius:100px;
  background:rgba(212,118,78,.08);border:1px solid rgba(212,118,78,.15);
}
.card-loc{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin-bottom:5px}
.card-title{font-family:'Playfair Display',serif;font-size:1.65rem;line-height:1.2;margin-bottom:5px}
.card-date{font-size:.78rem;color:var(--text-dim);margin-bottom:20px;font-style:italic}
.card-text{font-size:.91rem;line-height:1.8;color:var(--text);opacity:.82}
.card-text p{margin-bottom:13px}
.card-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}
.tag{padding:4px 12px;border-radius:100px;font-size:.7rem;border:1px solid rgba(0,0,0,.08);color:var(--text-dim)}
.card-close{
  position:sticky;top:12px;float:right;margin:12px 12px 0 0;
  width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.06);
  border:1px solid rgba(0,0,0,.08);color:var(--text);font-size:1.1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;z-index:5;
}
.card-close:hover{background:rgba(0,0,0,.1)}
.card-actions{margin-top:24px;padding-top:18px;border-top:1px solid rgba(0,0,0,.06);display:flex;gap:8px}
.btn-a{
  background:transparent;border:1px solid rgba(0,0,0,.1);
  color:var(--text-dim);padding:8px 16px;border-radius:100px;
  font-size:.76rem;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;
}
.btn-a:hover{background:rgba(0,0,0,.04);color:var(--text)}
.btn-a.danger{border-color:rgba(194,83,106,.25);color:var(--accent2)}
.btn-a.danger:hover{background:rgba(194,83,106,.06)}

/* Modal */
.modal-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.4);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.active{display:flex}
.modal{
  background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:20px;
  padding:30px;width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.12);
}
.modal h2{font-family:'Playfair Display',serif;font-size:1.35rem;margin-bottom:4px}
.modal-sub{font-size:.8rem;color:var(--text-dim);margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:4px}
.field input,.field textarea,.field select{
  width:100%;background:rgba(0,0,0,.02);border:1px solid rgba(0,0,0,.1);
  border-radius:10px;padding:10px 14px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;transition:border .2s;
}
.field input:focus,.field textarea:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:100px}
.field-row{display:flex;gap:10px}
.field-row .field{flex:1}

.emoji-grid{display:flex;gap:5px;flex-wrap:wrap}
.emoji-grid button{
  width:34px;height:34px;border-radius:8px;
  border:1px solid rgba(0,0,0,.06);background:rgba(0,0,0,.01);
  font-size:1.1rem;cursor:pointer;transition:all .2s;
}
.emoji-grid button:hover,.emoji-grid button.sel{
  background:rgba(212,118,78,.1);border-color:var(--accent);transform:scale(1.1);
}

.color-grid{display:flex;gap:6px;flex-wrap:wrap}
.color-grid button{
  width:30px;height:30px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:all .2s;
}
.color-grid button:hover,.color-grid button.sel{
  border-color:var(--text);transform:scale(1.15);
}

.image-urls{display:flex;flex-direction:column;gap:6px}
.img-row{display:flex;gap:6px;align-items:center}
.img-row input{flex:1}
.btn-rm{
  width:30px;height:30px;border-radius:8px;flex-shrink:0;
  background:rgba(194,83,106,.06);border:1px solid rgba(194,83,106,.15);
  color:var(--accent2);cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;
}
.btn-add-url{
  background:transparent;border:1px dashed rgba(0,0,0,.12);
  color:var(--text-dim);padding:7px;border-radius:10px;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;transition:all .2s;
}
.btn-add-url:hover{border-color:var(--accent);color:var(--accent)}

.modal-actions{display:flex;gap:10px;margin-top:22px;justify-content:flex-end}
.btn-cancel{
  background:transparent;border:1px solid rgba(0,0,0,.1);
  color:var(--text-dim);padding:10px 20px;border-radius:100px;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.84rem;
}
.btn-save{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;padding:10px 24px;border-radius:100px;
  cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:.84rem;
  box-shadow:0 4px 16px rgba(212,118,78,.25);
}

.lightbox{
  position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.9);
  backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;cursor:zoom-out;
}
.lightbox.active{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:6px}

@media(max-width:600px){
  .site-header{padding:12px 14px}
  .logo{font-size:1.1rem}
  .bottom-bar{gap:12px;padding:8px 14px;font-size:.68rem}
  .detail-card{width:100%}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">lauren <span class="amp">&</span> viraj's <span class="amp">world</span></div>
</header>

<div id="cesiumContainer"></div>

<div class="bottom-bar">
  <div><strong id="pinCount">0</strong> memories</div>
  <div><strong id="placeCount">0</strong> places</div>
  <div style="opacity:.5">right-click to add · scroll to zoom</div>
</div>

<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-coords" id="ctxCoords"></div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctxAlbum"><div class="icon">📸</div><div>Add Photo Album</div></div>
  <div class="ctx-item" id="ctxBlog"><div class="icon">✏️</div><div>Add Blog Post</div></div>
  <div class="ctx-item" id="ctxNote"><div class="icon">📌</div><div>Add Quick Note</div></div>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail-card" id="detailCard">
  <button class="card-close" id="cardClose">✕</button>
  <div id="cardContent"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalInner"></div>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2.49.1/dist/umd/supabase.js"></script>
<script src="https://cesium.com/downloads/cesiumjs/releases/1.95/Build/Cesium/Cesium.js"></script>
<script>
// ═══════════════════════════════════════
//  DATA
// ═══════════════════════════════════════
const PIN_COLORS = ['#d4764e','#c2536a','#4a90b8','#5ba87a','#c49a3c','#9b6cb8','#d49a6e','#4ab8a0','#e85d75','#3a7ca5','#d4a03c','#6b8f3a'];
const EMOJIS = ['💕','✨','🌊','🏮','🍜','🚗','🌅','⛰️','🎵','🍷','☕','🌸','📸','🏠','🎒','🏖️'];

let pins = [];
let dbReady = false;
let sb = null; // supabase client — set after Cesium loads

// Sample data fallback
const SAMPLE_PINS = [
  {id:1,type:'blog',title:"Where It All Began",location:"Paris, France",lat:48.8566,lng:2.3522,date:"March 2023",emoji:"💕",text:"We stood on Pont des Arts at golden hour, the Seine shimmering below. You said something silly about the pigeons and I knew right then this was going to be something special.\n\nWe walked for hours that evening — through the Marais, past Notre-Dame, down tiny streets that smelled like fresh bread.",images:[],tags:["love","first trip","sunset"],color:"#c2536a"},
  {id:2,type:'album',title:"Lost in Translation",location:"Tokyo, Japan",lat:35.6762,lng:139.6503,date:"October 2023",emoji:"🏮",text:"Shibuya at midnight feels like standing inside a neon heartbeat. Best ramen of our lives.",images:["https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=800","https://images.unsplash.com/photo-1536098561742-ca998e48cbcc?w=800","https://images.unsplash.com/photo-1551641506-ee5bf4cb45f1?w=800"],tags:["adventure","food","city"],color:"#d4764e"},
  {id:3,type:'blog',title:"Morning Swim",location:"Santorini, Greece",lat:36.3932,lng:25.4615,date:"July 2024",emoji:"🌊",text:"Woke up before the sun and walked down those impossible white stairs to the water. The Aegean was perfectly still, dark blue glass.\n\nBreakfast was honey and yogurt on a terrace overlooking the caldera. Some mornings are just perfect.",images:["https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=800"],tags:["summer","beach","sunrise"],color:"#4a90b8"},
];

// ═══════════════════════════════════════
//  CESIUM SETUP
// ═══════════════════════════════════════
// No Cesium ion token needed — using open tile sources only
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzMjc0OTQwNy02NjIzLTQzNjktOGUyOC04NjRiMDA5MThhMTMiLCJpZCI6MjU5LCJpYXQiOjE3MjY3NjIwNDB9.x';

const creditDiv = document.createElement('div');
creditDiv.style.display = 'none';

const viewer = new Cesium.Viewer('cesiumContainer', {
  imageryProvider: new Cesium.UrlTemplateImageryProvider({
    url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    subdomains: 'abcd',
    maximumLevel: 19,
    credit: 'CartoDB Voyager'
  }),
  baseLayerPicker: false,
  geocoder: false,
  homeButton: false,
  sceneModePicker: false,
  navigationHelpButton: false,
  animation: false,
  timeline: false,
  fullscreenButton: false,
  vrButton: false,
  infoBox: false,
  selectionIndicator: false,
  creditContainer: creditDiv,
  terrainProvider: new Cesium.EllipsoidTerrainProvider(),
  skyBox: false,
  requestRenderMode: false,
});

// Clean globe look
viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#1a1a2e');
viewer.scene.globe.enableLighting = false;
viewer.scene.fog.enabled = false;
viewer.scene.globe.showGroundAtmosphere = true;
viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#a8c8d8');

// Set initial view
viewer.camera.flyTo({
  destination: Cesium.Cartesian3.fromDegrees(20, 30, 15000000),
  duration: 0
});

// ═══════════════════════════════════════
//  PIN ENTITIES
// ═══════════════════════════════════════
function createPinCanvas(emoji, color) {
  const size = 48;
  const c = document.createElement('canvas');
  c.width = size; c.height = size + 16;
  const ctx = c.getContext('2d');

  // Pin tail
  ctx.beginPath();
  ctx.moveTo(size/2 - 4, size - 4);
  ctx.lineTo(size/2, size + 14);
  ctx.lineTo(size/2 + 4, size - 4);
  ctx.fillStyle = color;
  ctx.fill();

  // Circle
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  // White inner
  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2 - 6, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Emoji
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, size/2, size/2 + 1);

  return c;
}

function rebuildEntities() {
  viewer.entities.removeAll();
  pins.forEach(pin => {
    const canvas = createPinCanvas(pin.emoji || '📍', pin.color || '#d4764e');
    viewer.entities.add({
      id: 'pin_' + pin.id,
      position: Cesium.Cartesian3.fromDegrees(pin.lng, pin.lat),
      billboard: {
        image: canvas,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
        scale: 0.8,
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
        scaleByDistance: new Cesium.NearFarScalar(1e3, 1.2, 1e7, 0.5),
      },
      label: {
        text: pin.title,
        font: '600 14px "DM Sans", sans-serif',
        fillColor: Cesium.Color.WHITE,
        outlineColor: Cesium.Color.BLACK,
        outlineWidth: 3,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        pixelOffset: new Cesium.Cartesian2(0, -70),
        disableDepthTestDistance: Number.POSITIVE_INFINITY,
        scaleByDistance: new Cesium.NearFarScalar(1e3, 1, 5e6, 0.6),
        distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0, 8e6),
      },
      description: JSON.stringify(pin),
    });
  });
}
// Show sample pins immediately while Supabase loads
pins = SAMPLE_PINS;
rebuildEntities();

// ═══════════════════════════════════════
//  CLICK HANDLING — open detail on left click
// ═══════════════════════════════════════
const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);

handler.setInputAction(function(click) {
  const picked = viewer.scene.pick(click.position);
  if (Cesium.defined(picked) && picked.id && picked.id.description) {
    try {
      const desc = picked.id.description.getValue();
      const pin = JSON.parse(desc);
      openDetail(pin);
    } catch(e) { console.log(e); }
  }
}, Cesium.ScreenSpaceEventType.LEFT_CLICK);

// ═══════════════════════════════════════
//  RIGHT-CLICK CONTEXT MENU (native DOM event — most reliable)
// ═══════════════════════════════════════
const ctxMenu = document.getElementById('ctxMenu');
let ctxLatLng = {lat:0,lng:0};

// Use native contextmenu event — this always fires reliably
document.getElementById('cesiumContainer').addEventListener('contextmenu', function(e) {
  e.preventDefault();
  e.stopPropagation();

  // Convert screen position to Cesium cartesian
  const rect = viewer.scene.canvas.getBoundingClientRect();
  const cesiumPos = new Cesium.Cartesian2(
    e.clientX - rect.left,
    e.clientY - rect.top
  );

  const cartesian = viewer.camera.pickEllipsoid(cesiumPos, viewer.scene.globe.ellipsoid);
  if (!cartesian) { ctxMenu.classList.remove('show'); return; }

  const carto = Cesium.Cartographic.fromCartesian(cartesian);
  const lat = Cesium.Math.toDegrees(carto.latitude);
  const lng = Cesium.Math.toDegrees(carto.longitude);

  ctxLatLng = {lat: Math.round(lat*100)/100, lng: Math.round(lng*100)/100};
  document.getElementById('ctxCoords').textContent =
    `${Math.abs(ctxLatLng.lat).toFixed(2)}°${lat>=0?'N':'S'}, ${Math.abs(ctxLatLng.lng).toFixed(2)}°${lng>=0?'E':'W'}`;

  let mx = e.clientX, my = e.clientY;
  if(mx+230>innerWidth) mx=innerWidth-235;
  if(my+200>innerHeight) my=innerHeight-205;
  ctxMenu.style.left = mx+'px';
  ctxMenu.style.top = my+'px';
  ctxMenu.classList.add('show');
});

// Close context menu
function closeCtx() { ctxMenu.classList.remove('show'); }
document.addEventListener('mousedown', e => {
  if (!ctxMenu.contains(e.target)) closeCtx();
});
document.addEventListener('wheel', closeCtx);

// Context menu items
document.getElementById('ctxAlbum').addEventListener('mousedown', e => { e.stopPropagation(); closeCtx(); openModal('album', ctxLatLng); });
document.getElementById('ctxBlog').addEventListener('mousedown', e => { e.stopPropagation(); closeCtx(); openModal('blog', ctxLatLng); });
document.getElementById('ctxNote').addEventListener('mousedown', e => { e.stopPropagation(); closeCtx(); openModal('note', ctxLatLng); });

// ═══════════════════════════════════════
//  DETAIL PANEL
// ═══════════════════════════════════════
const overlay = document.getElementById('overlay');
const detailCard = document.getElementById('detailCard');
const cardContent = document.getElementById('cardContent');

function openDetail(pin) {
  const labels = {album:'📸 Photo Album', blog:'✏️ Blog Post', note:'📌 Note'};
  let hero = '';
  if (pin.images && pin.images.length) {
    const cls = pin.images.length>=3?'c3':pin.images.length===2?'c2':'c1';
    hero = `<div class="card-gallery ${cls}">${pin.images.map(u=>`<img src="${u}" onclick="openLB('${u}')" onerror="this.style.display='none'">`).join('')}</div>`;
  } else {
    hero = `<div class="card-hero-emoji" style="background:linear-gradient(135deg,${pin.color}15,#faf7f2)">${pin.emoji||'📍'}</div>`;
  }
  const txt = (pin.text||'').split('\n\n').map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  const tags = (pin.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  cardContent.innerHTML = `
    <div>${hero}</div>
    <div class="card-body">
      <div class="card-badge">${labels[pin.type]||'📍 Memory'}</div>
      <div class="card-loc">${pin.location}</div>
      <div class="card-title">${pin.title}</div>
      ${pin.date?`<div class="card-date">${pin.date}</div>`:''}
      <div class="card-text">${txt}</div>
      ${tags?`<div class="card-tags">${tags}</div>`:''}
      <div class="card-actions">
        <button class="btn-a" id="btnEdit">✏️ Edit</button>
        <button class="btn-a danger" id="btnDel">🗑 Delete</button>
      </div>
    </div>`;

  document.getElementById('btnEdit').onclick = () => {
    closeDetail();
    setTimeout(() => openModal(pin.type, {lat:pin.lat,lng:pin.lng}, pin), 350);
  };
  document.getElementById('btnDel').onclick = async () => {
    if (confirm('Delete this memory?')) {
      try {
        if (pin.id && dbReady) {
          await deletePin(pin.id);
        } else {
          pins = pins.filter(p => p.id !== pin.id);
          rebuildEntities(); updateStats();
        }
      } catch(e) {
        console.error('Delete error:', e);
        pins = pins.filter(p => p.id !== pin.id);
        rebuildEntities(); updateStats();
      }
      closeDetail();
    }
  };
  overlay.classList.add('active');
  detailCard.classList.add('active');
}

function closeDetail() {
  overlay.classList.remove('active');
  detailCard.classList.remove('active');
}
document.getElementById('cardClose').onclick = closeDetail;
overlay.onclick = closeDetail;

const lightbox = document.getElementById('lightbox');
window.openLB = url => { document.getElementById('lightboxImg').src=url; lightbox.classList.add('active'); };
lightbox.onclick = () => lightbox.classList.remove('active');

// ═══════════════════════════════════════
//  MODAL — Add / Edit
// ═══════════════════════════════════════
const modalOverlay = document.getElementById('modalOverlay');
const modalInner = document.getElementById('modalInner');

function openModal(type, coords, editPin=null) {
  const isEdit = !!editPin;
  const labels = {album:'📸 Photo Album', blog:'✏️ Blog Post', note:'📌 Quick Note'};
  const pin = editPin || {title:'',location:'',lat:coords.lat,lng:coords.lng,date:'',emoji:'📍',text:'',images:[],tags:[],color:PIN_COLORS[Math.floor(Math.random()*PIN_COLORS.length)]};

  let imgSection = '';
  if (type==='album'||type==='blog') {
    const urls = pin.images.length ? pin.images : [''];
    imgSection = `<div class="field"><label>Image URLs</label>
      <div class="image-urls" id="imageUrls">
        ${urls.map(u=>`<div class="img-row"><input type="text" class="img-url" value="${u}" placeholder="https://..."><button class="btn-rm" onclick="this.parentElement.remove()">×</button></div>`).join('')}
      </div>
      <button class="btn-add-url" id="addUrlBtn">+ Add another image</button>
    </div>`;
  }

  modalInner.innerHTML = `
    <h2>${isEdit?'Edit':'New'} ${labels[type]||type}</h2>
    <p class="modal-sub">${isEdit?'Update this memory':'Pin a new memory to the globe'}</p>
    <div class="field"><label>Title</label><input id="mTitle" value="${pin.title}" placeholder="Our first sunrise…"></div>
    <div class="field"><label>Location name</label><input id="mLocation" value="${pin.location}" placeholder="Paris, France"></div>
    <div class="field-row">
      <div class="field"><label>Latitude</label><input type="number" step="any" id="mLat" value="${pin.lat}"></div>
      <div class="field"><label>Longitude</label><input type="number" step="any" id="mLng" value="${pin.lng}"></div>
    </div>
    <div class="field"><label>Date</label><input id="mDate" value="${pin.date||''}" placeholder="Summer 2024"></div>
    <div class="field"><label>Icon</label><div class="emoji-grid" id="emojiGrid"></div></div>
    <div class="field"><label>Pin Color</label><div class="color-grid" id="colorGrid"></div></div>
    <div class="field"><label>${type==='note'?'Note':'Your story'}</label>
      <textarea id="mText" placeholder="${type==='blog'?'Write your blog post…':type==='note'?'A quick thought…':'Describe this album…'}">${pin.text}</textarea>
    </div>
    ${imgSection}
    <div class="field"><label>Tags (comma-separated)</label><input id="mTags" value="${(pin.tags||[]).join(', ')}" placeholder="adventure, food, sunset"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-save" id="modalSave">${isEdit?'Update':'Save Memory'}</button>
    </div>`;

  // Emoji picker
  const grid = document.getElementById('emojiGrid');
  EMOJIS.forEach(em => {
    const b = document.createElement('button'); b.textContent = em;
    if (em===pin.emoji) b.classList.add('sel');
    b.onclick = () => { grid.querySelectorAll('button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
    grid.appendChild(b);
  });

  // Color picker
  const cGrid = document.getElementById('colorGrid');
  PIN_COLORS.forEach(c => {
    const b = document.createElement('button');
    b.style.background = c;
    if (c===pin.color) b.classList.add('sel');
    b.onclick = () => { cGrid.querySelectorAll('button').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
    cGrid.appendChild(b);
  });

  // Add URL button
  const addUrlBtn = document.getElementById('addUrlBtn');
  if (addUrlBtn) {
    addUrlBtn.onclick = () => {
      const container = document.getElementById('imageUrls');
      const row = document.createElement('div');
      row.className = 'img-row';
      row.innerHTML = `<input type="text" class="img-url" placeholder="https://..."><button class="btn-rm" onclick="this.parentElement.remove()">×</button>`;
      container.appendChild(row);
    };
  }

  document.getElementById('modalCancel').onclick = () => modalOverlay.classList.remove('active');
  document.getElementById('modalSave').onclick = async () => {
    const title = document.getElementById('mTitle').value.trim();
    const lat = parseFloat(document.getElementById('mLat').value);
    const lng = parseFloat(document.getElementById('mLng').value);
    if (!title||isNaN(lat)||isNaN(lng)) { alert('Please add a title and valid coordinates.'); return; }

    const selEmoji = grid.querySelector('.sel');
    const selColor = cGrid.querySelector('.sel');
    const images = [...document.querySelectorAll('.img-url')].map(i=>i.value.trim()).filter(Boolean);

    const data = {
      type, title,
      location: document.getElementById('mLocation').value.trim() || `${lat.toFixed(1)}, ${lng.toFixed(1)}`,
      lat, lng, date: document.getElementById('mDate').value||'',
      emoji: selEmoji?selEmoji.textContent:'📍',
      color: selColor?selColor.style.background:pin.color,
      text: document.getElementById('mText').value||'',
      images, tags: document.getElementById('mTags').value.split(',').map(s=>s.trim()).filter(Boolean),
    };

    try {
      if (isEdit && pin.id && dbReady) {
        await updatePin(pin.id, data);
      } else {
        await savePin(data);
      }
    } catch(e) {
      console.error('Save error:', e);
      // Fallback: update local array if Supabase not connected
      if (isEdit) { const idx=pins.findIndex(p=>p.id===pin.id); if(idx!==-1) Object.assign(pins[idx], data); }
      else pins.push({ ...data, id: Date.now() });
      rebuildEntities(); updateStats();
    }

    modalOverlay.classList.remove('active');

    // Fly to new pin
    if (!isEdit) {
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(lng, lat, 2000000),
        duration: 1.5
      });
    }
  };
  modalOverlay.classList.add('active');
}

// ═══════════════════════════════════════
//  STATS
// ═══════════════════════════════════════
function updateStats() {
  document.getElementById('pinCount').textContent = pins.length;
  document.getElementById('placeCount').textContent = new Set(pins.map(p=>p.location)).size;
}

// ═══════════════════════════════════════
//  SUPABASE SETUP — runs after Cesium is fully ready
// ═══════════════════════════════════════
async function loadPins() {
  if (!sb) return;
  try {
    const { data, error } = await sb
      .from('pins')
      .select('*')
      .order('created_at', { ascending: true });

    if (error) throw error;
    dbReady = true;
    pins = data || [];
  } catch(e) {
    console.warn('Supabase load error:', e);
    if (!dbReady) pins = SAMPLE_PINS;
  }
  rebuildEntities();
  updateStats();
}

async function savePin(data) {
  if (!sb) throw new Error('DB not connected');
  const { error } = await sb.from('pins').insert([data]);
  if (error) throw error;
}

async function updatePin(pinId, data) {
  if (!sb) throw new Error('DB not connected');
  const { error } = await sb.from('pins').update(data).eq('id', pinId);
  if (error) throw error;
}

async function deletePin(pinId) {
  if (!sb) throw new Error('DB not connected');
  const { error } = await sb.from('pins').delete().eq('id', pinId);
  if (error) throw error;
}

// Initialize Supabase — wrapped in try/catch so globe always shows
try {
  const SUPABASE_URL = 'https://vhhlrdflkpjwcfyrukmo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_jfPTwc6fPTtwsi3l90qxxw_HQbg5KE0';
  const _supa = window.supabase;
  const _createClient = _supa.createClient || _supa.default?.createClient;
  if (!_createClient) throw new Error('Supabase CDN not loaded');
  sb = _createClient(SUPABASE_URL, SUPABASE_KEY);

  // Real-time subscription — syncs across all devices
  sb.channel('pins-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'pins' }, () => {
      loadPins();
    })
    .subscribe();

  // Load pins from DB
  loadPins();
} catch(e) {
  console.warn('Supabase init failed, using sample data:', e);
  pins = SAMPLE_PINS;
  rebuildEntities();
  updateStats();
}
</script>
